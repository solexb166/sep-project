{% extends 'base.html' %}
{% block title %}Delete Listing — SEP{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger border-0 shadow-sm">
                <div class="card-body p-4 text-center">
                    <div class="display-3 mb-3 text-danger"><i class="bi bi-trash3-fill"></i></div>
                    <h4 class="fw-bold mb-2">Delete this listing?</h4>
                    <p class="text-muted mb-4">
                        <strong>{{ listing.title }}</strong> will be removed from the marketplace. This cannot be undone.
                    </p>
                    <form method="post" class="d-flex gap-3 justify-content-center">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'listing_detail' pk=listing.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
