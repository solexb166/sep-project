{% load humanize %}
<div class="col-6">
    <div class="listing-card h-100">
        <div class="position-relative">
            {% with listing.get_primary_image as img %}
            {% if img %}
                <img src="{{ img.image.url }}" alt="{{ listing.title }}" class="card-img-top" style="height:140px;object-fit:cover;">
            {% else %}
                <div class="listing-image-placeholder" style="height:140px;"><i class="bi bi-image text-muted" style="font-size:2rem;"></i></div>
            {% endif %}
            {% endwith %}
            <span class="badge condition-badge condition-{{ listing.condition|lower|cut:' ' }} position-absolute top-0 start-0 m-1" style="font-size:0.6rem;">
                {{ listing.condition }}
            </span>
            <button class="wishlist-btn position-absolute top-0 end-0 m-1 {% if listing.pk in wishlist_ids %}active{% endif %}"
                    data-listing-id="{{ listing.pk }}" data-csrf="{{ csrf_token }}">
                <i class="bi {% if listing.pk in wishlist_ids %}bi-heart-fill text-danger{% else %}bi-heart text-white{% endif %}" style="font-size:0.85rem;"></i>
            </button>
        </div>
        <div class="p-2">
            <div class="price-ugx" style="font-size:0.85rem;">UGX {{ listing.price|intcomma }}</div>
            <h6 class="mb-1 text-truncate fw-semibold" style="font-size:0.8rem;">
                <a href="{% url 'listing_detail' listing.pk %}" class="text-dark text-decoration-none stretched-link">
                    {{ listing.title }}
                </a>
            </h6>
            <div class="d-flex align-items-center gap-1" style="font-size:0.7rem;color:#7a8499;">
                <span class="text-truncate">{{ listing.seller.first_name }}</span>
                {% if listing.seller.is_verified %}<i class="bi bi-patch-check-fill text-success"></i>{% endif %}
            </div>
        </div>
    </div>
</div>
