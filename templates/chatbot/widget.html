{% load static %}
<!-- Chatbot Widget -->
<div id="chatbot-widget">
    <!-- Collapsed Button -->
    <button id="chatbot-toggle" class="chatbot-toggle-btn" title="Chat with SEP Support">
        <i class="bi bi-chat-dots-fill" id="chat-icon"></i>
        <i class="bi bi-x-lg d-none" id="close-icon"></i>
        <span class="chatbot-badge d-none" id="chatbot-badge">1</span>
    </button>

    <!-- Chat Panel -->
    <div id="chatbot-panel" class="chatbot-panel d-none">
        <!-- Header -->
        <div class="chatbot-header">
            <div class="d-flex align-items-center gap-2">
                <div class="chatbot-avatar"><i class="bi bi-robot text-primary fs-5"></i></div>
                <div>
                    <div class="fw-semibold">SEP Support</div>
                    <div class="small opacity-75">AI Assistant · Online</div>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-light" id="chatbot-minimize" title="Minimize">
                    <i class="bi bi-dash"></i>
                </button>
                <button class="btn btn-sm btn-outline-light" id="chatbot-close" title="Close">
                    <i class="bi bi-x"></i>
                </button>
            </div>
        </div>

        <!-- Messages Area -->
        <div class="chatbot-messages" id="chatbot-messages">
            <!-- Welcome message injected by JS -->
        </div>

        <!-- Typing Indicator -->
        <div class="chatbot-typing d-none" id="chatbot-typing">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <!-- Quick Actions -->
        <div class="chatbot-quick-actions" id="chatbot-quick-actions">
            <button class="quick-action-btn" data-msg="How do I sell an item?">How do I sell?</button>
            <button class="quick-action-btn" data-msg="I need help with payment">Payment Help</button>
            <button class="quick-action-btn" data-msg="I want to report a problem">Report a Problem</button>
            <button class="quick-action-btn" data-msg="I need to contact human support">Contact Support</button>
        </div>

        <!-- Input Area -->
        <div class="chatbot-input">
            <form id="chatbot-form" class="d-flex gap-2">
                {% csrf_token %}
                <input type="text" id="chatbot-input-field" class="form-control" placeholder="Type a message..." autocomplete="off">
                <button type="submit" class="btn btn-primary" id="chatbot-send">
                    <i class="bi bi-send-fill"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
// Pass Django context to JS
window.SEP_CHATBOT_CONFIG = {
    apiUrl: "{% url 'chatbot_api' %}",
    csrfToken: "{{ csrf_token }}",
    isAuthenticated: {% if user.is_authenticated %}true{% else %}false{% endif %},
    userName: "{% if user.is_authenticated %}{{ user.first_name|escapejs }}{% endif %}"
};
</script>
